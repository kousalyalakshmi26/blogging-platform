<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Blogging Platform</title>

<style>

body{
font-family: Arial;
background:#f4f4f4;
margin:0;
padding:0;
}

header{
background:#333;
color:white;
padding:15px;
text-align:center;
}

nav{
background:#555;
padding:10px;
text-align:center;
}

nav a{
color:white;
margin:10px;
text-decoration:none;
font-weight:bold;
}

.container{
width:80%;
margin:auto;
margin-top:20px;
}

.create-post{
background:white;
padding:20px;
border-radius:8px;
margin-bottom:20px;
}

.create-post input, textarea{
width:100%;
padding:10px;
margin-top:10px;
}

.create-post button{
background:#28a745;
color:white;
border:none;
padding:10px;
margin-top:10px;
cursor:pointer;
}

.post{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:8px;
}

.like-btn{
background:#007bff;
color:white;
border:none;
padding:8px;
cursor:pointer;
}

.comment-box{
margin-top:15px;
}

.comment-box input{
width:80%;
padding:8px;
}

.comment-box button{
padding:8px;
background:#333;
color:white;
border:none;
}

.comments{
margin-top:10px;
background:#f9f9f9;
padding:10px;
}

</style>
</head>

<body>

<header>
<h1>Blogging Platform</h1>
<p>Create • Like • Comment</p>
</header>

<nav>
<a href="#">Home</a>
<a href="#">My Profile</a>
<a href="#">My Posts</a>
<a href="#">Logout</a>
</nav>

<div class="container">

<!-- Create Blog Post -->
<div class="create-post">
<h2>Create New Blog</h2>

<input type="text" id="title" placeholder="Blog Title">

<textarea id="content" rows="5" placeholder="Write your blog here..."></textarea>

<button onclick="addPost()">Publish Post</button>

</div>

<!-- Blog Posts Section -->

<div id="posts"></div>

</div>


<script>

let posts=[];

function addPost(){

let title=document.getElementById("title").value;
let content=document.getElementById("content").value;

if(title=="" || content==""){
alert("Please fill all fields");
return;
}

let post={
title:title,
content:content,
likes:0,
comments:[]
};

posts.push(post);

displayPosts();

document.getElementById("title").value="";
document.getElementById("content").value="";

}

function displayPosts(){

let postSection=document.getElementById("posts");
postSection.innerHTML="";

posts.forEach((post,index)=>{

let div=document.createElement("div");
div.className="post";

div.innerHTML=`

<h3>${post.title}</h3>
<p>${post.content}</p>

<button class="like-btn" onclick="likePost(${index})">
👍 Like (${post.likes})
</button>

<div class="comment-box">

<input type="text" id="comment-${index}" placeholder="Write comment">

<button onclick="addComment(${index})">Comment</button>

</div>

<div class="comments" id="comments-${index}"></div>

`;

postSection.appendChild(div);

post.comments.forEach(c=>{
let p=document.createElement("p");
p.innerText=c;
document.getElementById(`comments-${index}`).appendChild(p);
});

});

}

function likePost(index){
posts[index].likes++;
displayPosts();
}

function addComment(index){

let commentInput=document.getElementById(`comment-${index}`);
let comment=commentInput.value;

if(comment=="") return;

posts[index].comments.push(comment);

displayPosts();

}

</script>

</body>
</html>
